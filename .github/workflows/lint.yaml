name: Lint

on:
  push:
    branches:
      - main
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "scripts/**"
      - "internal/schema/**"
      - ".golangci.yml"
      - ".github/workflows/lint.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "scripts/**"
      - "internal/schema/**"
      - ".golangci.yml"
      - ".github/workflows/lint.yaml"

jobs:
  golangci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0
